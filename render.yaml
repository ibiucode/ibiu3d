services:
  - type: web
    name: 3dprint-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 3dprint-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ibiucode.github.io/ibiu3d
      - key: ADMIN_DEFAULT_EMAIL
        value: admin@example.com
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MAIL_ENABLED
        value: "true"
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false   # 在 Render dashboard 手動填入
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_NAME
        value: 職人自造
      - key: MAIL_ADMIN_TO
        sync: false

databases:
  - name: 3dprint-db
    databaseName: 3dprint_db
    user: 3dprint_user
